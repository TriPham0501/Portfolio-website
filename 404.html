<!DOCTYPE html>
<html lang=en>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <meta name="msapplication-TileColor" content="rgb(0, 188, 212)">
  <meta name="theme-color" content="rgb(0, 188, 212)">
  <title>OBIRADUST</title>
  <script>
    // GitHub Pages SPA redirect: encode the current path into a query param
    // and redirect back to index.html so React Router can handle it.
    // pathSegmentsToKeep=1 preserves the /Portfolio-website repo prefix.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
  <link rel="stylesheet" href="https://js.arcgis.com/4.11/esri/css/main.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.0/css/all.css" integrity="sha384-lKuwvrZot6UHsBSfcMvOkWwlCMgc0TaWr+30HWe3a4ltaBwTZhyTEggF5tJv8tbt" crossorigin="anonymous">
  <!-- <link rel="stylesheet" href="react-table.css"> -->
</head>

<body>
  <noscript> JavaScript is required in order to use this app </noscript>
  <div id="root"></div>
  <script>
    if (global === undefined) {
      var global = window;
    }
  </script>
</body>

</html>
